services:
  db:
    image: postgres:16
    container_name: greening_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greening_india
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: greening_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: "no"

volumes:
  postgres_data: